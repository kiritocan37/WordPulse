<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldPulse | Global News Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="aurora-bg">
    <div class="aurora-blob aurora-1"></div>
    <div class="aurora-blob aurora-2"></div>
  </div>
  <header class="top-nav">
    <div class="logo">WorldPulse</div>
    <span id="edition-date" class="edition-date"></span>
    <div class="controls">
      <select id="lang-select" class="lang-toggle">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="ua">Українська</option>
      </select>
    </div>
  </header>

  <nav class="filters">
    <div class="filter-group" id="category-filters">
      <button class="filter-btn active" data-category="">All Categories</button>
      <button class="filter-btn" data-category="world">World</button>
      <button class="filter-btn" data-category="politics">Politics</button>
      <button class="filter-btn" data-category="tech">Tech</button>
      <button class="filter-btn" data-category="culture">Culture</button>
    </div>
    <div class="filter-group" id="country-filters">
      <button class="filter-btn active" data-country="">All Regions</button>
      <button class="filter-btn" data-country="UK">UK</button>
      <button class="filter-btn" data-country="US">US / Intl</button>
      <button class="filter-btn" data-country="QA">Qatar</button>
      <button class="filter-btn" data-country="DE">Germany</button>
      <button class="filter-btn" data-country="FR">France</button>
      <button class="filter-btn" data-country="RU">Russia</button>
    </div>
  </nav>

  <main>
    <div id="loader" class="loader loader-pulse">Loading latest global pulse…</div>
    <div id="error-message" class="error-message hidden"></div>
    
    <section id="hero-section" class="hero hidden">
      <!-- Hero article injected via JS -->
    </section>

    <hr id="section-divider" class="section-divider hidden">

    <section id="bento-grid" class="bento-grid hidden">
      <!-- Articles injected via JS -->
    </section>
  </main>

  <footer>
    <p>&copy; 2026 WorldPulse &mdash; Editorial Global Aggregator</p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
